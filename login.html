<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Yoman Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full glass p-10 rounded-3xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-[#FFCC00]">YOMAN ADMIN</h1>
            <p class="text-gray-400 mt-2">Acceso al panel de control</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm mb-2">Correo electrónico</label>
                <input id="email" type="email" required 
                       class="w-full bg-zinc-900 border border-white/20 rounded-3xl px-6 py-4 focus:border-[#FFCC00]">
            </div>
            <div>
                <label class="block text-sm mb-2">Contraseña</label>
                <input id="password" type="password" required 
                       class="w-full bg-zinc-900 border border-white/20 rounded-3xl px-6 py-4 focus:border-[#FFCC00]">
            </div>
            <button type="submit" 
                    class="w-full bg-[#FFCC00] text-black py-6 rounded-3xl text-xl font-semibold">
                Iniciar Sesión
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-8">
            ¿Olvidaste tu contraseña? Contacta al administrador.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'TU_SUPABASE_URL';           // ← Cambia esto
        const supabaseAnonKey = 'TU_ANON_KEY';           // ← Cambia esto

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                window.location.href = '/admin.html';
            }
        });
    </script>
</body>
</html>
